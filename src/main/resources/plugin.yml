name: NationsSMP
version: 1.0.0
main: com.nationssmp.NationsSMP
api-version: 1.20
authors: [NationsSMP]
description: The ultimate nations SMP plugin with armies, oaths, legends and war.
depend: [Citizens]

commands:
  army:
    description: Manage your bot army
    usage: /army <list|assign|follow|stay|attack|mine|defend|status|spam>
    permission: nationssmp.player
  nation:
    description: View nation info or manage your nation
    usage: /nation <info|setbanner|animals>
    permission: nationssmp.player
  givebots:
    description: Give your bots and everything to another nation before death
    usage: /givebots <nationName>
    permission: nationssmp.player
  nsadmin:
    description: Admin tools
    usage: /nsadmin <spawnitems|resetglitch|resetthrone|spawncastle|listlands>
    permission: nationssmp.admin
  bookcommand:
    description: Use the Book of Command to kill a player
    usage: /bookcommand <playerName>
    permission: nationssmp.player
  summondragon:
    description: Summon the dragon if you own the Iron Throne
    usage: /summondragon
    permission: nationssmp.player
  I:
    description: Swear an oath - /I BEAR OATH TO <player> <title> OF <nation>
    usage: /I BEAR OATH TO <player> <title> OF <nation>
    permission: nationssmp.player

permissions:
  nationssmp.player:
    description: Standard player permission
    default: true
  nationssmp.admin:
    description: Admin permission
    default: op
